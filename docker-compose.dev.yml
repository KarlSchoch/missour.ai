version: "3.9"
services:
  web:
    build:
      context: .
      target: dev
    depends_on:
      - rabbitmq
    working_dir: /app/missourai_django
    command: ["/app/.venv/bin/python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file: .env
    environment:
      DJANGO_VITE_DEV: "true"
      DEBUG: "True"
      MODEL_ENV: "dev"
    volumes:
      - .:/app
      - venv:/app/.venv
      - ./missourai_django/db.sqlite3:/app/missourai_django/db.sqlite3
      - ./missourai_django/media:/app/missourai_django/media
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      target: dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    working_dir: /app/missourai_django
    command:
      - /app/.venv/bin/python
      - -m
      - celery
      - -A
      - missourai_web_app
      - worker
      - --loglevel=INFO
      - --concurrency=1
    env_file: .env
    environment:
      DEBUG: "True"
      MODEL_ENV: "dev"
    volumes:
      - .:/app
      - venv:/app/.venv
      - ./missourai_django/db.sqlite3:/app/missourai_django/db.sqlite3
      - ./missourai_django/media:/app/missourai_django/media

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"

volumes:
  venv:
  frontend_node_modules:
  rabbitmq-data:
