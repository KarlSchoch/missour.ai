log_format upload_timing
    'nginx_timing request_id=$request_id remote_addr=$remote_addr request="$request" '
    'status=$status body_bytes_sent=$body_bytes_sent request_length=$request_length '
    'request_time=$request_time upstream_response_time=$upstream_response_time '
    'upstream_connect_time=$upstream_connect_time upstream_header_time=$upstream_header_time '
    'http_host="$host" request_uri="$request_uri" '
    'http_referer="$http_referer" http_user_agent="$http_user_agent"';

server {
    listen 80;
    server_name missour.ai www.missour.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name missour.ai www.missour.ai;

    access_log /var/log/nginx/access.log upload_timing;

    client_max_body_size 10G;
    client_body_timeout 3600s;

    ssl_certificate /etc/letsencrypt/live/missour.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/missour.ai/privkey.pem;

    location = / {
        return 302 /transcription/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }
}
