version: "3.9"

x-logging: &default-logging
  driver: local
  options:
    max-size: "50m"
    max-file: "10"

services:
  web:
    build:
      context: .
      target: runtime
    env_file: .env
    environment:
      DJANGO_VITE_DEV: "false"
      MODEL_ENV: "prod"
      DEBUG: "False"
      DJANGO_LOG_DIR: "/var/log/missourai"
    expose:
      - "8000"
    volumes:
      - ./missourai_django/db.sqlite3:/app/missourai_django/db.sqlite3
      - ./missourai_django/media:/app/missourai_django/media
      - ./logs/web:/var/log/missourai
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx-entrypoint.sh:/docker/nginx-entrypoint.sh:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
      - ./logs/nginx:/var/log/nginx
    command: ["/bin/sh", "/docker/nginx-entrypoint.sh"]
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./docker/certbot-renew.sh:/docker/certbot-renew.sh:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot
      - ./logs/certbot:/var/log/letsencrypt
    command: ["/bin/sh", "/docker/certbot-renew.sh"]
    logging: *default-logging

volumes:
  certbot-etc:
  certbot-var:
